// ==================== 渲染引擎 ====================
function priceBadge(p,bl){
  var ratio = p/bl;
  if(ratio<=0.9) return '<span class="badge bd-good">✓ 好价</span>';
  if(ratio<=1.15) return '<span class="badge bd-norm">正常</span>';
  if(ratio<=1.35) return '<span class="badge bd-hot">偏贵</span>';
  return '<span class="badge bd-hot">贵</span>';
}
function gaugeBar(p,bl){
  var ratio = Math.min(p/bl,2), w = Math.round(ratio*50);
  var color = ratio<=0.9?'#059669':ratio<=1.15?'#D97706':'#DC2626';
  return '<div class="gauge"><div class="gauge-fill" style="width:'+w+'%;background:'+color+'"></div></div>';
}
function link(href,label){
  return '<a href="'+(href||'#')+'" target="_blank" class="btn-bk">'+(label||'预订')+'</a>';
}

// Quick stats
function rStats(){
  var lowest=null, biggest=null, routesBelow=0;
  R.forEach(function(r){
    var f=D.flights[r.id]; if(!f||!f.o||!f.o.length) return;
    var p=f.o[0].p, diff=((p-r.bl)/r.bl*100).toFixed(0);
    if(!lowest||p<lowest.p) lowest={city:r.city,emoji:r.emoji,p:p};
    if(!biggest||diff<biggest.diff) biggest={city:r.city,emoji:r.emoji,diff:diff};
    if(p<=r.bl*1.1) routesBelow++;
  });
  var h = '';
  if(lowest) h+='<div class="card2 p-2 text-center"><div class="stat-num dn">¥'+lowest.p+'</div><div class="stat-label">'+lowest.emoji+'最低去程价</div></div>';
  if(biggest) h+='<div class="card2 p-2 text-center"><div class="stat-num dn">'+biggest.diff+'%</div><div class="stat-label">'+biggest.emoji+'低于基准</div></div>';
  h+='<div class="card2 p-2 text-center"><div class="stat-num">'+routesBelow+'/6</div><div class="stat-label">航线低于或接近基准</div></div>';
  document.getElementById('quickStats').innerHTML=h;
}

    var dh=(dhs&&dhs.length)?dhs[0]:null;
    var total = o.p + (rt?rt.p:Math.round(r.blR)) + (dh?dh.p*3:r.blH*3);
    h+='<div class="card p-3 mb-2" style="cursor:pointer" onclick="this.querySelector(\'a\')&&this.querySelector(\'a\').click()">';
    h+='<div class="flex items-center justify-between mb-2"><div class="flex items-center gap-2"><span class="dest-tag '+r.dt+'">'+r.emoji+' '+r.city+'</span>'+priceBadge(o.p,r.bl)+'</div><span class="text-xs text-gray-500">3天2晚估算</span></div>';
    h+='<div class="grid-3 text-center">';
    h+='<div><div class="text-xs text-gray-400">✈️ 去程</div><div class="font-bold '+(o.p<=r.bl?'dn':'')+'">¥'+o.p+'</div><div class="text-xs text-gray-400">'+o.a+' '+o.d+'</div></div>';
    h+='<div><div class="text-xs text-gray-400">🔁 返程</div><div class="font-bold">¥'+(rt?rt.p:'~'+Math.round(r.blR))+'</div><div class="text-xs text-gray-400">'+(rt?rt.a+' '+(rt.d||''):'待查')+'</div></div>';
    h+='<div><div class="text-xs text-gray-400">🏨 住宿×3晚</div><div class="font-bold">¥'+(dh?dh.p*3:r.blH*3)+'</div><div class="text-xs text-gray-400">'+(dh?dh.n:'待查')+'</div></div>';
    h+='</div>';
    h+='<div class="flex items-center justify-between mt-2 pt-2 border-t border-gray-100"><span class="text-sm font-bold">💰 单人估算：<span class="text-warm-600 text-base">¥'+total+'</span></span>'+gaugeBar(total,(r.bl+r.blR+r.blH*3)*0.85)+'<a href="'+r.outU+'" target="_blank" class="btn-bk">去预订</a></div>';
    h+='</div>';
  });
  document.getElementById('tripCards').innerHTML=h;
}

// Flight tables
function rFlightTable(id,dir){
  var h='',label=dir==='o'?'去程':'返程',dirLabel=dir==='o'?'合肥→':'→合肥';
  R.forEach(function(r){
    var f=D.flights[r.id],flights=dir==='o'?(f&&f.o||[]):(f&&f.r||[]);
    if(!flights.length) return;
    var bl=dir==='o'?r.bl:r.blR;
    h+='<div class="card p-3 mb-2"><div class="flex items-center justify-between mb-2"><span class="dest-tag '+r.dt+'">'+r.emoji+' '+dirLabel+r.city+'</span><span class="text-xs text-gray-400">基准 ¥'+bl+'起</span></div>';
    h+='<div class="tbl-w"><table><thead><tr><th>价格</th><th>航司</th><th>日期</th><th>时刻</th><th></th><th>性价比</th><th></th></tr></thead><tbody>';
    flights.forEach(function(fl,i){
      var lnk=fl.l||(dir==='o'?r.outU:r.retU);
      h+='<tr><td class="font-bold '+(i===0?'dn':'')+'">¥'+fl.p+'</td><td>'+fl.a+'</td><td>'+fl.d+'</td><td class="text-xs text-gray-500">'+fl.t+'</td><td>'+(fl.n?'<span class="badge bd-info">'+fl.n+'</span>':'')+'</td><td>'+priceBadge(fl.p,bl)+' '+gaugeBar(fl.p,bl)+'</td><td>'+link(lnk)+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  });
  document.getElementById(id).innerHTML=h||'<p class="text-sm text-gray-400 py-2">暂无数据</p>';
}

// Hotels
function rHefeiHotels(){

    h+='<div class="tbl-w"><table><thead><tr><th>分店</th><th>房型</th><th>价格/晚</th><th>评分</th><th>早餐</th><th></th></tr></thead><tbody>';
    brand.data.forEach(function(hh,i){
      h+='<tr><td class="text-xs">'+hh.n+'</td><td>'+hh.r+'</td><td class="font-bold '+(i===0?'dn':'')+'">¥'+hh.p+'</td><td>⭐'+hh.s+'</td><td class="text-xs text-gray-500">'+hh.e+'</td><td>'+link(hh.l)+'</td></tr>';

function rDestHotels(){
  var h='',cities=[
    {k:'guilin',n:'桂林',e:'🏯'},{k:'kunming',n:'昆明',e:'🌸'},{k:'lijiang',n:'丽江',e:'🏔️'},

    hs.forEach(function(hh,i){
      h+='<tr><td class="text-xs font-medium">'+hh.n+'</td><td class="text-xs text-gray-500">'+hh.c+'</td><td>'+hh.r+'</td><td class="font-bold '+(i===0?'dn':'')+'">¥'+hh.p+'</td><td>'+link(hh.l)+'</td></tr>';

// Deals
function rDeals(){
  var el=document.getElementById('hotDeals');
  if(!D.hd||!D.hd.length){el.innerHTML='<div class="card p-3"><p class="text-sm text-gray-500">今日无大幅低于基准的特价</p></div>';return;}
  el.innerHTML=D.hd.map(function(d){
    return '<div class="card p-3 mb-2 flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-lg">'+d.t+'</span><div><div class="text-sm font-medium">'+d.c+'</div><div class="text-xs text-gray-500">'+d.s+'</div></div></div>'+link(d.l,'去预订')+'</div>';
  }).join('');
}

// Charts
var c1=null,c2=null,curRoute='hfe-kwl';

function drawCharts(routeId){
  curRoute=routeId;
  var r=R.find(function(x){return x.id===routeId;});
  var dates=[],prices=[],bls=[];
  var keys=Object.keys(D.history).sort();
  keys.forEach(function(k){
    dates.push(k);
    prices.push(D.history[k][routeId]||null);
    bls.push(r.bl);
  });
  // Chart 1 - single route trend
  var ctx1=document.getElementById('chart1').getContext('2d');
  if(c1) c1.destroy();
  c1=new Chart(ctx1,{type:'line',data:{labels:dates,datasets:[
    {label:r.emoji+' '+r.city+' 最低价',data:prices,borderColor:'#FF7B3D',backgroundColor:'rgba(255,123,61,0.08)',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:'#FF7B3D',borderWidth:2},
    {label:'基准价 ¥'+r.bl,data:bls,borderColor:'#94a3b8',borderDash:[6,3],pointRadius:0,fill:false,borderWidth:1.5}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:r.emoji+' '+r.city+' 去程价格走势',font:{size:13},padding:8},legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},padding:10}}},scales:{y:{title:{display:true,text:'¥',font:{size:10}},ticks:{callback:function(v){return'¥'+v}}},x:{ticks:{font:{size:10}}}}}});

  // Chart 2 - all routes comparison
  var ctx2=document.getElementById('chart2').getContext('2d');
  if(c2) c2.destroy();
  var colors=['#FF7B3D','#3B82F6','#8B5CF6','#10B981','#EF4444','#6B7280'];
  var datasets=R.map(function(rr,i){
    var pp=keys.map(function(k){return D.history[k][rr.id]||null;});
    return {label:rr.emoji+' '+rr.city,data:pp,borderColor:colors[i],backgroundColor:colors[i]+'15',fill:false,tension:0.3,pointRadius:3,borderWidth:2};
  });
  c2=new Chart(ctx2,{type:'line',data:{labels:dates,datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:'6目的地 去程价格对比',font:{size:13},padding:8},legend:{position:'bottom',labels:{boxWidth:10,font:{size:9},padding:6}}},scales:{y:{title:{display:true,text:'¥',font:{size:10}},ticks:{callback:function(v){return'¥'+v}}},x:{ticks:{font:{size:10}}}}}});

  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var ab=document.querySelector('.tab[data-route="'+routeId+'"]');
  if(ab) ab.classList.add('on');
}

// Tabs + Quick links
function rTabs(){
  var h='<span class="text-xs text-gray-500 py-1">单航线走势：</span>';
  R.forEach(function(r){
    h+='<button class="tab'+(r.id===curRoute?' on':'')+'" data-route="'+r.id+'" onclick="drawCharts(\''+r.id+'\')">'+r.emoji+' '+r.city+'</button>';
  });
  document.getElementById('chartTabs').innerHTML=h;
}

    ['🏔️丽江住','https://hotels.ctrip.com/hotel/lijiang/'],['🌊大理住','https://hotels.ctrip.com/hotel/dali/'],
    ['🌴版纳住','https://hotels.ctrip.com/hotel/jinghong/'],['⛰️香格里拉住','https://hotels.ctrip.com/hotel/shangri-la/'],
