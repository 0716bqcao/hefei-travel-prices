// ==================== 渲染 ====================
function badge(p,bl){var r=p/bl;return r<=0.9?'<span class="badge bd-good">好价</span>':r<=1.15?'<span class="badge bd-norm">正常</span>':'<span class="badge bd-hot">偏贵</span>';}
function gauge(p,bl){var r=Math.min(p/bl,1.8),w=Math.round(r*55);var c=r<=0.9?'#059669':r<=1.15?'#D97706':'#DC2626';return'<div class="gauge"><div class="gauge-fill" style="width:'+w+'%;background:'+c+'"></div></div>';}
function lnk(href,label){return'<a href="'+href+'" target="_blank" class="'+(label==='去程'||label==='返程'?'btn-ol':'btn')+'">'+label+'</a>';}

// Stats
function rStats(){
  var best=null,most=null,deals=0;
  R.forEach(function(r){
    var t=D.trips[r.id];if(!t||!t.length)return;
    var tr=t[0],tot=tr.op+tr.rp;
    if(!best||tot<best.tot) best={e:r.e,city:r.city,tot:tot};
    var save=Math.round((1-(tr.op+tr.rp)/(r.bl+r.blR))*100);
    if(!most||save>most.save) most={e:r.e,city:r.city,save:save};
    if(tr.op<=r.bl) deals++;
  });
  var h='';
  if(best) h+='<div class="card2 p-2 text-center"><div class="stat-n dn">¥'+best.tot+'</div><div class="stat-l">'+best.e+'最低往返价</div></div>';
  if(most) h+='<div class="card2 p-2 text-center"><div class="stat-n dn">-'+most.save+'%</div><div class="stat-l">'+most.e+'低于基准</div></div>';
  h+='<div class="card2 p-2 text-center"><div class="stat-n">'+deals+'/6</div><div class="stat-l">目的地有好价</div></div>';
  document.getElementById('quickStats').innerHTML=h;
}

// TRIP CARDS - the main feature
function rTripCards(){
  var h='';
  R.forEach(function(r){
    var ts=D.trips[r.id];if(!ts||!ts.length)return;
    var best=ts[0],bestTot=best.op+best.rp;
    h+='<div class="card mb-2"><div style="padding:10px 12px;background:linear-gradient(135deg,#f8f6f3,#fff);border-bottom:1px solid #f0ede8">';
    h+='<div class="flex items-center justify-between"><div class="flex items-center gap-2"><span style="font-size:20px">'+r.e+'</span><span class="font-bold">'+r.city+'</span><span class="badge bd-info">基准往返 ¥'+(r.bl+r.blR)+'</span></div>';
    h+='<span class="text-xs text-gray-400">最优 ¥'+bestTot+'</span></div></div>';

    // Each round-trip combo
    h+='<div style="padding:8px 12px">';
    ts.forEach(function(t,i){
      var tot=t.op+t.rp,isBest=i===0;
      h+='<div style="padding:8px 0;'+(i<ts.length-1?'border-bottom:1px dashed #f0ede8':'')+'">';
      // Row: number + outbound → return + total + links
      h+='<div class="flex items-center gap-2 flex-wrap">';
      h+='<span class="text-xs font-bold text-gray-400 w-5">#'+(i+1)+'</span>';
      // Outbound
      h+='<div style="flex:1;min-width:140px"><div class="flex items-center gap-1"><span class="text-xs text-gray-500">去</span><span class="font-bold text-sm">'+t.od+'</span><span class="font-bold '+(t.op<=r.bl?'dn':'')+'">¥'+t.op+'</span></div><div class="text-xs text-gray-400">'+t.oa+' '+t.ot+(t.n?' <span class="badge bd-info">'+t.n+'</span>':'')+'</div></div>';
      // Return
      h+='<div style="flex:1;min-width:140px"><div class="flex items-center gap-1"><span class="text-xs text-gray-500">返</span><span class="font-bold text-sm">'+t.rd+'</span><span class="font-bold">¥'+t.rp+'</span></div><div class="text-xs text-gray-400">'+t.ra+' '+t.rt+'</div></div>';
      // Total + link buttons
      h+='<div class="text-center" style="min-width:80px"><div class="font-black text-base '+(isBest?'dn':'')+'">¥'+tot+'</div><div class="text-xs text-gray-400">往返总价</div></div>';
      h+='<div class="flex gap-1">'+lnk(fUrl('hfe',r.code.toLowerCase(),t.od),'去程')+lnk(fUrl(r.code.toLowerCase(),'hfe',t.rd),'返程')+'</div>';
      h+='</div>';
      // Quality bar
      if(isBest) h+='<div class="mt-1 flex items-center gap-2"><span class="badge bd-best">最优组合</span>'+gauge(tot,r.bl+r.blR)+'<span class="text-xs text-gray-400">比基准往返省 ¥'+(r.bl+r.blR-tot)+'</span></div>';
      h+='</div>';
    });
    h+='</div></div>';
  });
  document.getElementById('tripCards').innerHTML=h;
}

function rHotels(){
  var h='';
  [{b:'桔子水晶',c:'orange',dot:'bg-orange-500',ds:D.hotels.o},{b:'亚朵',c:'atour',dot:'bg-blue-600',ds:D.hotels.a}].forEach(function(bd){
    h+='<div class="card p-3 mb-2"><div class="flex items-center gap-2 mb-2"><span class="w-2 h-2 rounded-full '+bd.dot+' inline-block"></span><span class="font-bold text-sm">'+bd.b+'</span><span class="text-xs text-gray-400">· 本周参考价</span></div>';
    h+='<div class="tbl-w"><table><thead><tr><th>分店</th><th>房型</th><th>参考价/晚</th><th>评分</th><th>平台比价</th></tr></thead><tbody>';
    bd.ds.forEach(function(hh,i){
      h+='<tr><td class="text-xs">'+hh.n+'</td><td>'+hh.r+'</td><td class="font-bold '+(i===0?'dn':'')+'">¥'+hh.p+'<div class="text-xs text-gray-400 font-normal">参考价</div></td><td>⭐'+hh.s+'</td><td class="flex gap-1 flex-wrap">'+lnk(hh.l,'携程')+lnk('https://hotel.qunar.com/city/hefei/','去哪儿')+lnk('https://www.fliggy.com/','飞猪')+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  });
  document.getElementById('hefeiHotels').innerHTML=h;
}

function rDestHotels(){
  var cities=[{k:'guilin',n:'桂林',e:'🏯'},{k:'kunming',n:'昆明',e:'🌸'},{k:'lijiang',n:'丽江',e:'🏔️'},{k:'dali',n:'大理',e:'🌊'},{k:'banna',n:'西双版纳',e:'🌴'},{k:'xgll',n:'香格里拉',e:'⛰️'}];
  var h='';
  cities.forEach(function(c){
    var hs=D.dh[c.k];if(!hs||!hs.length)return;
    h+='<div class="card p-3 mb-2"><div class="font-bold text-sm mb-2">'+c.e+' '+c.n+'住宿</div>';
    h+='<div class="tbl-w"><table><thead><tr><th>酒店</th><th>位置</th><th>房型</th><th>参考价/晚</th><th>平台</th></tr></thead><tbody>';
    hs.forEach(function(hh,i){
      h+='<tr><td class="text-xs font-medium">'+hh.n+'</td><td class="text-xs text-gray-500">'+hh.c+'</td><td>'+hh.r+'</td><td class="font-bold '+(i===0?'dn':'')+'">¥'+hh.p+'<div class="text-xs text-gray-400 font-normal">参考价</div></td><td class="flex gap-1 flex-wrap">'+lnk(hh.l,'查看')+'</td></tr>';
    });
    h+='</tbody></table></div></div>';
  });
  document.getElementById('destHotels').innerHTML=h;
}

// Deals
function rDeals(){
  var el=document.getElementById('hotDeals');
  if(!D.hd||!D.hd.length){el.innerHTML='<div class="card p-3"><p class="text-sm text-gray-500">暂无推荐</p></div>';return;}
  el.innerHTML=D.hd.map(function(d){return'<div class="card p-3 mb-2 flex items-center justify-between"><div class="flex items-center gap-2"><span class="text-lg">'+d.e+'</span><div class="text-sm font-medium">'+d.c+'</div></div>'+lnk(d.l,'去预订')+'</div>';}).join('');
}

// Charts
var c1=null,c2=null,curRoute='hfe-kwl';
function drawCharts(rid){
  curRoute=rid;
  var r=R.find(function(x){return x.id===rid;});
  var dates=[],prices=[],bls=[];
  var keys=Object.keys(D.history).sort();
  keys.forEach(function(k){dates.push(k);prices.push(D.history[k][rid]||null);bls.push(r.bl);});

  var ctx1=document.getElementById('chart1').getContext('2d');
  if(c1)c1.destroy();
  c1=new Chart(ctx1,{type:'line',data:{labels:dates,datasets:[
    {label:r.e+' '+r.city+' 最低去程价',data:prices,borderColor:'#FF7B3D',backgroundColor:'rgba(255,123,61,0.08)',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:'#FF7B3D',borderWidth:2},
    {label:'基准 ¥'+r.bl,data:bls,borderColor:'#94a3b8',borderDash:[6,3],pointRadius:0,fill:false,borderWidth:1.5}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:r.e+' '+r.city+' 去程价格走势',font:{size:13},padding:8},legend:{position:'bottom',labels:{boxWidth:10,font:{size:10},padding:8}}},scales:{y:{title:{display:true,text:'¥'},ticks:{callback:function(v){return'¥'+v}}},x:{ticks:{font:{size:10}}}}}});

  var ctx2=document.getElementById('chart2').getContext('2d');
  if(c2)c2.destroy();
  var colors=['#FF7B3D','#3B82F6','#8B5CF6','#10B981','#EF4444','#6B7280'];
  var ds=R.map(function(rr,i){var pp=keys.map(function(k){return D.history[k][rr.id]||null;});return{label:rr.e+' '+rr.city,data:pp,borderColor:colors[i],backgroundColor:colors[i]+'15',fill:false,tension:0.3,pointRadius:3,borderWidth:2};});
  c2=new Chart(ctx2,{type:'line',data:{labels:dates,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:'6目的地 去程价格对比',font:{size:13},padding:8},legend:{position:'bottom',labels:{boxWidth:10,font:{size:9},padding:6}}},scales:{y:{title:{display:true,text:'¥'},ticks:{callback:function(v){return'¥'+v}}},x:{ticks:{font:{size:10}}}}}});

  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var ab=document.querySelector('.tab[data-route="'+rid+'"]');if(ab)ab.classList.add('on');
}

function rTabs(){var h='';R.forEach(function(r){h+='<button class="tab'+(r.id===curRoute?' on':'')+'" data-route="'+r.id+'" onclick="drawCharts(\''+r.id+'\')">'+r.e+' '+r.city+'</button>';});document.getElementById('chartTabs').innerHTML=h;}
function rLinks(){var ls=[['✈️桂林','https://flights.ctrip.com/booking/hfe-kwl-day-1.html'],['✈️昆明','https://flights.ctrip.com/booking/hfe-kmg-day-1.html'],['✈️丽江','https://flights.ctrip.com/booking/hfe-ljg-day-1.html'],['✈️大理','https://flights.ctrip.com/booking/hfe-dlu-day-1.html'],['✈️版纳','https://flights.ctrip.com/booking/hfe-jhg-day-1.html'],['✈️香格里拉','https://flights.ctrip.com/booking/hfe-dig-day-1.html'],['🏨桔子水晶','https://hotels.ctrip.com/hotel/hefei/crystal-orange'],['🏨亚朵','https://hotels.ctrip.com/hotel/hefei/atour'],['🏯桂林','https://hotels.ctrip.com/hotel/guilin/'],['🌸昆明','https://hotels.ctrip.com/hotel/kunming/'],['🏔️丽江','https://hotels.ctrip.com/hotel/lijiang/'],['🌊大理','https://hotels.ctrip.com/hotel/dali/']];document.getElementById('quickLinks').innerHTML=ls.map(function(l){return'<a href="'+l[1]+'" target="_blank" class="card2 p-2 text-center text-xs font-medium">'+l[0]+'</a>';}).join('');}

document.getElementById('updateDate').textContent='📅 '+D.ud;

rStats();rTripCards();rHotels();rDestHotels();rDeals();rTabs();rLinks();drawCharts('hfe-kwl');
