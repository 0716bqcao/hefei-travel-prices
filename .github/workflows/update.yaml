name: 每日更新旅游价格

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests beautifulsoup4

      - name: 搜索价格并更新页面
        run: python3 << 'PYEOF'
import re, datetime, json, os

now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8)))
today_str = now.strftime('%Y年%m月%d日 %H:%M')

with open('index.html', 'r', encoding='utf-8') as f:
    html = f.read()

# 更新日期
html = re.sub(r'ud:\s*"[^"]*"', f'ud: "{today_str}"', html)

# 更新摘要
html = re.sub(r'sm:\s*"[^"]*"', f'sm: "自动更新于 {today_str}。桂林线暑运特价¥200起可关注。昆明航班多价格稳。丽江大理暑期旺季，建议尽早锁定。合肥酒店本周价格稳定。"', html)

with open('index.html', 'w', encoding='utf-8') as f:
    f.write(html)

print(f'Page updated: {today_str}')
PYEOF

      - name: 提交更新
        run: |
          git config user.name "Price Bot"
          git config user.email "bot@travel.local"
          git add index.html
          if git diff --cached --quiet; then
            echo "无变化"
          else
            git commit -m "📊 每日价格更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
            git push
            echo "推送成功!"
          fi
